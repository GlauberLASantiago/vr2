<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dominantes Secundárias em WebXR (Com Áudio e Lousas)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <!-- Tone.js carregado antes dos componentes A-Frame que dependem dele -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root {
            --primary: #4a90e2;
            --bg-glass: rgba(15, 20, 30, 0.7);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; touch-action: none; user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            color: var(--primary); transition: opacity 0.5s ease-out;
            text-align: center; padding: 20px; box-sizing: border-box;
        }

        .btn-start {
            margin-top: 20px; font-size: 1.2rem; padding: 15px 30px;
            background: var(--primary); color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
            transition: transform 0.2s, background 0.2s;
        }
        .btn-start:active { transform: scale(0.95); }

        #hud-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000; display: flex;
            flex-direction: column; justify-content: space-between;
        }

        .top-bar {
            background: var(--bg-glass); backdrop-filter: blur(5px);
            padding: 15px 20px; text-align: center; color: var(--text-color);
            border-bottom: 1px solid rgba(255,255,255,0.1); pointer-events: auto;
        }

        .top-bar h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; text-transform: uppercase; }

        .controls-panel {
            position: absolute; top: 70px; right: 20px; display: flex;
            flex-direction: column; gap: 10px; pointer-events: auto;
        }

        button.hud-btn {
            background: var(--bg-glass); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 8px; padding: 12px; cursor: pointer;
            backdrop-filter: blur(5px); font-weight: bold; transition: background 0.3s;
        }
        button.hud-btn:hover, button.hud-btn:focus { background: rgba(74, 144, 226, 0.5); outline: none; }

        .zoom-controls { display: flex; gap: 5px; }
        .zoom-controls button.hud-btn { width: 40px; }

        /* Botão de controle do vídeo */
        #video-controls-hud {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; pointer-events: auto; z-index: 1001;
        }

        .video-btn {
            background: var(--bg-glass); border: 1px solid rgba(255,255,255,0.3);
            color: white; border-radius: 50px; padding: 10px 22px;
            cursor: pointer; backdrop-filter: blur(5px);
            font-size: 1rem; font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            display: flex; align-items: center; gap: 8px;
        }
        .video-btn:active { transform: scale(0.93); }
        .video-btn.playing { background: rgba(231, 76, 60, 0.7); border-color: rgba(231,76,60,0.6); }
        .video-btn.stopped { background: rgba(46, 204, 113, 0.7); border-color: rgba(46,204,113,0.6); }

        /* Feedback visual de acorde tocado */
        #chord-feedback {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(74, 144, 226, 0.85); color: white;
            padding: 10px 24px; border-radius: 20px; font-size: 1.1rem; font-weight: bold;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
            z-index: 1001; white-space: nowrap;
        }
        #chord-feedback.visible { opacity: 1; }
    </style>

    <script>
        // ============================================================
        // ÁUDIO: inicialização segura depois de uma interação do usuário
        // ============================================================
        let synth = null;
        let audioReady = false;
        let audioInitPromise = null;

        const FLAT_TO_SHARP = {
            'Cb': 'B',  'Db': 'C#', 'Eb': 'D#', 'Fb': 'E',
            'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#'
        };

        function normalizeNote(note) {
            return String(note || '').trim().replace(/^([A-G]b)(-?\d)$/i, (match, pitch, octave) => {
                const normalizedPitch = FLAT_TO_SHARP[pitch[0].toUpperCase() + 'b'];
                return normalizedPitch ? `${normalizedPitch}${octave}` : match;
            });
        }

        async function initAudio() {
            if (audioReady && synth) return synth;
            if (audioInitPromise) return audioInitPromise;

            audioInitPromise = (async () => {
                if (!window.Tone) {
                    throw new Error('Tone.js não foi carregado. Verifique a conexão com a internet ou o CDN.');
                }

                await Tone.start();

                synth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: 'triangle' },
                    envelope: { attack: 0.03, decay: 0.25, sustain: 0.45, release: 1.2 }
                }).toDestination();

                synth.volume.value = -4;
                audioReady = true;
                console.log('Tone.js pronto. Estado do contexto:', Tone.context.state);
                return synth;
            })().catch((err) => {
                audioInitPromise = null;
                audioReady = false;
                console.error('Falha ao inicializar áudio:', err);
                showChordFeedback('Toque novamente para ativar o áudio');
                throw err;
            });

            return audioInitPromise;
        }

        function showChordFeedback(label) {
            const el = document.getElementById('chord-feedback');
            if (!el) return;
            el.textContent = label;
            el.classList.add('visible');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => el.classList.remove('visible'), 2000);
        }

        async function safePlayVideo(video) {
            if (!video) return;
            try {
                await video.play();
            } catch (err) {
                console.warn('O navegador bloqueou o vídeo até uma interação válida:', err);
                showChordFeedback('Toque no botão Play novamente');
            }
        }

        function stopVideo(video) {
            if (!video) return;
            video.pause();
            try { video.currentTime = 0; } catch (err) { console.warn('Não foi possível reiniciar o vídeo:', err); }
        }

        // ============================================================
        // Componente: Controle de Vídeo na lousa 3D
        // ============================================================
        AFRAME.registerComponent('video-controls', {
            init: function () {
                this.el.addEventListener('click', async () => {
                    const selector = this.el.getAttribute('src');
                    const video = selector ? document.querySelector(selector) : null;
                    if (!video) {
                        console.warn('Vídeo não encontrado para o seletor:', selector);
                        return;
                    }
                    if (video.paused) {
                        await safePlayVideo(video);
                    } else {
                        video.pause();
                    }
                });
            }
        });

        // ============================================================
        // Componente: Acordes clicáveis
        // ============================================================
        AFRAME.registerComponent('interactive-text', {
            schema: {
                notes: { type: 'string', default: 'C4, E4, G4' },
                label: { type: 'string', default: '' }
            },
            init: function () {
                this.el.addEventListener('click', async () => {
                    const chordArray = this.data.notes
                        .split(',')
                        .map(normalizeNote)
                        .filter(Boolean);

                    if (!chordArray.length) {
                        console.warn('Nenhuma nota válida encontrada em:', this.data.notes);
                        return;
                    }

                    try {
                        const activeSynth = await initAudio();
                        activeSynth.triggerAttackRelease(chordArray, '1n', Tone.now());
                        showChordFeedback(this.data.label || chordArray.join(' - '));

                        this.el.removeAttribute('animation__scale');
                        this.el.setAttribute('animation__scale', {
                            property: 'scale',
                            from: '1 1 1',
                            to: '1.25 1.25 1.25',
                            dur: 140,
                            easing: 'easeOutQuad',
                            dir: 'alternate',
                            loop: 1
                        });
                    } catch (err) {
                        console.error('Erro ao tocar acorde:', err);
                    }
                });
            }
        });

        // ============================================================
        // Interface / HUD
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loading-screen');
            const btnStart = document.getElementById('btn-start-scene');
            const env = document.querySelector('[environment]');
            const rig = document.querySelector('#camera-rig');
            const cam = document.querySelector('#main-camera');
            const scene = document.querySelector('a-scene');
            const video = document.getElementById('video3');
            const btnVideo = document.getElementById('btn-video-play');

            if (scene) {
                scene.addEventListener('loaded', () => console.log('Cena A-Frame carregada.'));
                scene.addEventListener('enter-vr', () => showChordFeedback('Modo VR ativado'));
                scene.addEventListener('exit-vr', () => showChordFeedback('Modo VR encerrado'));
            }

            if (video) {
                video.preload = 'metadata';
                video.setAttribute('playsinline', '');
                video.setAttribute('webkit-playsinline', '');
            }

            if (btnStart) {
                btnStart.addEventListener('click', async () => {
                    try {
                        await initAudio();
                    } catch (err) {
                        console.warn('Áudio ainda não foi ativado:', err);
                    }

                    if (typeof DeviceOrientationEvent !== 'undefined' &&
                        typeof DeviceOrientationEvent.requestPermission === 'function') {
                        try {
                            await DeviceOrientationEvent.requestPermission();
                        } catch (error) {
                            console.warn('Permissão de giroscópio negada ou indisponível:', error);
                        }
                    }

                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => { loader.style.display = 'none'; }, 500);
                    }
                }, { once: true });
            }

            let isNight = false;
            let isMap = false;
            const presets = ['forest', 'egypt', 'tron', 'japan', 'volcano', 'moon', 'osiris', 'arches'];
            let currentPresetIndex = 0;

            const btnScenario = document.getElementById('btn-scenario');
            if (btnScenario && env) {
                btnScenario.addEventListener('click', () => {
                    currentPresetIndex = (currentPresetIndex + 1) % presets.length;
                    env.setAttribute('environment', `preset: ${presets[currentPresetIndex]}; skyType: atmosphere; lighting: distant`);
                    isNight = false;
                });
            }

            const btnTheme = document.getElementById('btn-theme');
            if (btnTheme && env) {
                btnTheme.addEventListener('click', () => {
                    isNight = !isNight;
                    const preset = isNight ? 'starry' : presets[currentPresetIndex];
                    env.setAttribute('environment', `preset: ${preset}; skyType: atmosphere; lighting: distant`);
                });
            }

            const btnMap = document.getElementById('btn-map');
            if (btnMap && rig && cam) {
                btnMap.addEventListener('click', () => {
                    isMap = !isMap;
                    rig.setAttribute('animation__map', {
                        property: 'position',
                        to: isMap ? '0 12 0' : '0 0 0',
                        dur: 1000,
                        easing: 'easeInOutQuad'
                    });

                    const lookControls = cam.components && cam.components['look-controls'];
                    if (lookControls && lookControls.pitchObject) {
                        lookControls.pitchObject.rotation.x = isMap ? -Math.PI / 4 : 0;
                    }
                    showChordFeedback(isMap ? 'Visão mapa' : 'Visão normal');
                });
            }

            const btnZoomIn = document.getElementById('btn-zoom-in');
            if (btnZoomIn && cam) {
                btnZoomIn.addEventListener('click', () => {
                    const fov = Number(cam.getAttribute('fov')) || 80;
                    cam.setAttribute('fov', Math.max(30, fov - 10));
                });
            }

            const btnZoomOut = document.getElementById('btn-zoom-out');
            if (btnZoomOut && cam) {
                btnZoomOut.addEventListener('click', () => {
                    const fov = Number(cam.getAttribute('fov')) || 80;
                    cam.setAttribute('fov', Math.min(110, fov + 10));
                });
            }

            function updateVideoBtn() {
                if (!btnVideo || !video) return;
                if (video.paused || video.ended) {
                    btnVideo.innerHTML = '&#9654; Play Vídeo';
                    btnVideo.classList.remove('playing');
                    btnVideo.classList.add('stopped');
                } else {
                    btnVideo.innerHTML = '&#10074;&#10074; Pausar Vídeo';
                    btnVideo.classList.remove('stopped');
                    btnVideo.classList.add('playing');
                }
            }

            if (btnVideo && video) {
                btnVideo.addEventListener('click', async () => {
                    if (video.paused || video.ended) {
                        await safePlayVideo(video);
                    } else {
                        stopVideo(video);
                    }
                    updateVideoBtn();
                });

                video.addEventListener('play', updateVideoBtn);
                video.addEventListener('pause', updateVideoBtn);
                video.addEventListener('ended', updateVideoBtn);
                video.addEventListener('error', () => showChordFeedback('Erro ao carregar vídeo'));
                updateVideoBtn();
            }
        });
    </script>
</head>
<body>

    <div id="loading-screen">
        <h2>🎵 Dominantes Secundárias</h2>
        <p>Aprenda harmonia interagindo com a cena 3D.</p>
        <button id="btn-start-scene" class="btn-start">Entrar na Cena e Ativar Áudio</button>
    </div>

    <div id="hud-container">
        <div class="top-bar">
            <h1>Acordes Cromáticos em Dó</h1>
        </div>

        <div class="controls-panel">
            <button id="btn-scenario" class="hud-btn">🏞️ Mudar Cenário</button>
            <button id="btn-theme" class="hud-btn">🌙 Dia/Noite</button>
            <button id="btn-map" class="hud-btn">🗺️ Visão Mapa</button>
            <div class="zoom-controls">
                <button id="btn-zoom-in" class="hud-btn">🔍+</button>
                <button id="btn-zoom-out" class="hud-btn">🔍-</button>
            </div>
        </div>
    </div>

    <!-- Controles do Vídeo -->
    <div id="video-controls-hud">
        <button id="btn-video-play" class="video-btn stopped">&#9654; Play Vídeo</button>
    </div>

    <!-- Feedback de acorde tocado -->
    <div id="chord-feedback"></div>

    <a-scene renderer="colorManagement: true; physicallyCorrectLights: true" loading-screen="enabled: false">
        
        <a-assets timeout="10000">
            <img id="figura1" src="https://raw.githubusercontent.com/GlauberLASantiago/vr2/main/figura1.png" crossorigin="anonymous">
            <img id="figura2" src="https://raw.githubusercontent.com/GlauberLASantiago/vr2/main/figura2.png" crossorigin="anonymous">
            <video id="video3" src="https://raw.githubusercontent.com/GlauberLASantiago/vr2/main/VideoPergunta05.mp4" crossorigin="anonymous" loop="true" preload="metadata" playsinline webkit-playsinline></video>
            <img id="figura4" src="https://raw.githubusercontent.com/GlauberLASantiago/vr2/main/figura4.png" crossorigin="anonymous">
            <img id="figura5" src="https://raw.githubusercontent.com/GlauberLASantiago/vr2/main/figura5.png" crossorigin="anonymous">
        </a-assets>

        <a-entity environment="preset: forest; skyType: atmosphere; lighting: distant"></a-entity>

        <a-entity id="camera-rig" position="0 0 0">
            <a-camera id="main-camera" position="0 1.6 0" fov="80"
                      look-controls="pointerLockEnabled: false; touchEnabled: true; mouseEnabled: true"
                      wasd-controls="acceleration: 40"
                      cursor="rayOrigin: mouse; fuse: false"
                      raycaster="objects: .clickable; far: 100">
                <a-cursor id="vr-cursor"
                          cursor="rayOrigin: entity; fuse: false"
                          raycaster="objects: .clickable; far: 100"
                          color="#FFFFFF"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                          animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
                </a-cursor>
            </a-camera>
        </a-entity>

        <!-- ============================== -->
        <!-- LOUSAS COM AS IMAGENS DO GITHUB -->
        <!-- ============================== -->
        
        <a-entity position="-8.66 2.3 -5" rotation="0 60 0">
            <a-box width="5.2" height="4.2" depth="0.1" color="#2c3e50"></a-box>
            <a-image src="#figura1" width="5" height="4" position="0 0 0.06"></a-image>
        </a-entity>
        
        <a-entity position="-5 2.3 -8.66" rotation="0 30 0">
            <a-box width="5.2" height="4.2" depth="0.1" color="#2c3e50"></a-box>
            <a-image src="#figura2" width="5" height="4" position="0 0 0.06"></a-image>
        </a-entity>

        <a-entity position="0 2.3 -10" rotation="0 0 0">
            <a-box width="5.2" height="4.2" depth="0.1" color="#2c3e50"></a-box>
            <a-video class="clickable" video-controls src="#video3" width="5" height="4" position="0 0 0.06"></a-video>
            <a-text value="Toque para Play/Pause" align="center" position="0 -2.3 0" color="#FFF" scale="1.5 1.5 1.5"></a-text>
        </a-entity>
        
        <a-entity position="5 2.3 -8.66" rotation="0 -30 0">
            <a-box width="5.2" height="4.2" depth="0.1" color="#2c3e50"></a-box>
            <a-image src="#figura4" width="5" height="4" position="0 0 0.06"></a-image>
        </a-entity>

        <a-entity position="8.66 2.3 -5" rotation="0 -60 0">
            <a-box width="5.2" height="4.2" depth="0.1" color="#2c3e50"></a-box>
            <a-image src="#figura5" width="5" height="4" position="0 0 0.06"></a-image>
        </a-entity>

        <!-- ============================================================ -->
        <!-- ELEMENTOS MUSICAIS E ACORDES                                  -->
        <!-- Acordes atualizados conforme solicitação:                      -->
        <!-- G7, Bm7(b5), Bdim7, G7sus4 e Db7                              -->
        <!-- As notas com bemol foram escritas de forma enarmônica          -->
        <!-- para máxima compatibilidade com Tone.js.                       -->
        <!-- ============================================================ -->

        <!-- G7 (V7) -->
        <a-entity position="6 0 0">
            <a-cylinder radius="1.5" height="0.4" color="#DDDDDD"></a-cylinder>
            <a-entity position="0 1.5 0" look-at="#main-camera">
                <a-box depth="0.05" width="2.5" height="1" color="#DDDDDD">
                    <a-text value="G7
(V7)" align="center" color="#000" scale="2 2 2" position="0 0 0.026"></a-text>
                </a-box>
            </a-entity>
            <a-box class="clickable"
                   interactive-text="notes: G3, B3, D4, F4; label: G7 (V7)"
                   width="2" height="2" depth="2"
                   color="#00FF00" opacity="0.2" transparent="true"
                   position="0 0.5 0">
            </a-box>
            <a-box color="#FFFFFF" scale="0.8 0.8 0.8" position="0 0.5 0"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"></a-box>
        </a-entity>

        <!-- Bm7(b5) (VIIm7b5) -->
        <a-entity position="1.85 0 5.71">
            <a-cylinder radius="1" height="0.4" color="#F1C40F"></a-cylinder>
            <a-entity position="0 0.5 1" look-at="#main-camera">
                <a-box depth="0.05" width="2.4" height="0.6" color="#F1C40F">
                    <a-text value="Função: VIIm7b5" align="center" color="#000" scale="1.35 1.35 1.35" position="0 0 0.026"></a-text>
                </a-box>
            </a-entity>
            <a-sphere class="clickable"
                      interactive-text="notes: B3, D4, F4, A4; label: Bm7(b5) (VIIm7b5)"
                      radius="1.2"
                      color="#00FF00" opacity="0.2" transparent="true"
                      position="0 2 0">
            </a-sphere>
            <a-sphere radius="0.5" color="#E67E22" material="wireframe: true"
                      position="0 2 0"
                      animation="property: rotation; to: 360 360 0; loop: true; dur: 5000; easing: linear"></a-sphere>
            <a-entity position="0 2.8 0" look-at="#main-camera">
                <a-box depth="0.05" width="2.3" height="0.6" color="#FFFFFF">
                    <a-text value="Bm7(b5)" align="center" color="#000" scale="1.35 1.35 1.35" position="0 0 0.026"></a-text>
                </a-box>
            </a-entity>
        </a-entity>

        <!-- Bdim7 (VIIdim7) -->
        <a-entity position="-4.85 0 3.53">
            <a-cylinder radius="1" height="0.4" color="#3498DB"></a-cylinder>
            <a-entity position="0 0.5 1" look-at="#main-camera">
                <a-box depth="0.05" width="2.4" height="0.6" color="#3498DB">
                    <a-text value="Função: VIIdim7" align="center" color="#FFF" scale="1.35 1.35 1.35" position="0 0 0.026"></a-text>
                </a-box>
            </a-entity>
            <a-sphere class="clickable"
                      interactive-text="notes: B3, D4, F4, G#4; label: Bdim7 (VIIdim7)"
                      radius="1.2"
                      color="#00FF00" opacity="0.2" transparent="true"
                      position="0 2 0">
            </a-sphere>
            <a-octahedron radius="0.5" color="#2980B9" position="0 2 0"
                          animation="property: rotation; to: 0 360 360; loop: true; dur: 6000; easing: linear"></a-octahedron>
            <a-entity position="0 2.8 0" look-at="#main-camera">
                <a-box depth="0.05" width="2" height="0.6" color="#FFFFFF">
                    <a-text value="Bdim7" align="center" color="#000" scale="1.5 1.5 1.5" position="0 0 0.026"></a-text>
                </a-box>
            </a-entity>
        </a-entity>

        <!-- G7sus4 (V7sus4) -->
        <a-entity position="-4.85 0 -3.53">
            <a-cylinder radius="1" height="0.4" color="#E74C3C"></a-cylinder>
            <a-entity position="0 0.5 1" look-at="#main-camera">
                <a-box depth="0.05" width="2.4" height="0.6" color="#E74C3C">
                    <a-text value="Função: V7sus4" align="center" color="#FFF" scale="1.35 1.35 1.35" position="0 0 0.026"></a-text>
                </a-box>
            </a-entity>
            <a-sphere class="clickable"
                      interactive-text="notes: G3, C4, D4, F4; label: G7sus4 (V7sus4)"
                      radius="1.2"
                      color="#00FF00" opacity="0.2" transparent="true"
                      position="0 2 0">
            </a-sphere>
            <a-dodecahedron radius="0.4" color="#C0392B" position="0 2 0"
                            animation="property: rotation; to: 360 0 360; loop: true; dur: 7000; easing: linear"></a-dodecahedron>
            <a-entity position="0 2.8 0" look-at="#main-camera">
                <a-box depth="0.05" width="2.2" height="0.6" color="#FFFFFF">
                    <a-text value="G7sus4" align="center" color="#000" scale="1.5 1.5 1.5" position="0 0 0.026"></a-text>
                </a-box>
            </a-entity>
